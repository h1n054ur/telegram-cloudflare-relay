name = "telegram-cloudflare-relay"
main = "src/index.ts"
compatibility_date = "2026-07-14"

# ──────────────────────────────────────────────────────────────────────────────
# Secrets (set via `wrangler secret put <NAME>` after first deploy):
#
#   BOT_TOKEN — Your Telegram bot token from @BotFather
# ──────────────────────────────────────────────────────────────────────────────

# Service binding to your HookForms Worker (same Cloudflare account)
# Replace "hookforms-cf" with your actual HookForms Worker name
[[services]]
binding = "HOOKFORMS"
service = "hookforms-cf"
